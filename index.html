<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orb Letters</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="scene-root"></div>

      <div class="floating-tools">
        <button id="theme-toggle" class="emoji-button" type="button" aria-label="Toggle theme">&#127769;</button>
        <button id="admin-toggle" class="emoji-button" type="button" aria-label="Open controls">&#9776;</button>
      </div>

      <aside id="admin-panel" class="admin-panel is-hidden">
        <div class="admin-panel__header">
          <div>
            <p class="admin-panel__eyebrow">Orb Letters</p>
            <h2>Controls</h2>
          </div>
          <div class="admin-panel__actions">
            <span id="status-readout" class="status-pill">Live</span>
            <button id="admin-close" class="emoji-button emoji-button--small" type="button" aria-label="Close controls">&times;</button>
          </div>
        </div>

        <section class="panel-section">
          <label class="field field--stacked">
            <span>Text</span>
            <textarea id="text-input" rows="7">You are allowed to become slowly. Not every transition arrives as a breakthrough; sometimes it looks like staying in motion long enough for uncertainty to turn into form, for the noisy parts of the story to soften, and for the next version of you to appear through repetition, patience, and one more deliberate step. What feels unfinished is often only early. The shape keeps changing because it is still listening, still gathering signal, still deciding which fragments deserve to become structure and which should remain atmosphere. Some futures do not announce themselves. They gather at the edges first, in habits, in returns, and in the way attention keeps circling the same need until the body finally understands that desire is also a map.</textarea>
          </label>
          <div class="actions">
            <button id="text-submit" type="button">Apply</button>
            <button id="shuffle-button" type="button">Shuffle</button>
            <button id="reset-button" type="button">Reset</button>
          </div>
        </section>

        <section class="panel-grid">
          <label class="field">
            <span>Mode</span>
            <select id="scene-mode">
              <option value="still">Still</option>
              <option value="tide" selected>Tide</option>
              <option value="nova">Nova</option>
            </select>
          </label>

          <label class="field">
            <span>Intensity</span>
            <input id="engine-intensity" type="range" min="0.35" max="1.4" step="0.01" value="0.82" />
          </label>
        </section>
      </aside>
    </div>
  </body>
</html>
